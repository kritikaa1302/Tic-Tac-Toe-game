<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flower Tic Tac Toe</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

/* animated aurora background */

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(270deg,#020617,#0f172a,#1e293b,#020617);
background-size:600% 600%;
animation:aurora 15s ease infinite;
color:white;
}

@keyframes aurora{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* glass card */

.container{
text-align:center;
padding:35px;
border-radius:25px;

background:rgba(255,255,255,0.06);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);

box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

/* buttons */

button{
padding:10px 20px;
border:none;
border-radius:20px;

background:linear-gradient(45deg,#ec4899,#8b5cf6);
color:white;

cursor:pointer;
margin:6px;
font-weight:500;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 15px #ec4899;
}

/* board */

.board{
display:grid;
grid-template-columns:repeat(3,110px);
gap:12px;
margin-top:20px;
justify-content:center;
}

.cell{
width:110px;
height:110px;

background:rgba(255,255,255,0.1);
border-radius:18px;

display:flex;
align-items:center;
justify-content:center;

font-size:45px;
cursor:pointer;
transition:0.3s;
}

.cell:hover{
background:rgba(255,255,255,0.25);
transform:scale(1.05);
}

.win{
background:#22c55e !important;
}

#status{
margin-top:15px;
font-size:20px;
}

.scoreboard{
margin-top:10px;
font-size:18px;
}

/* flower celebration */

.flower{
position:absolute;
font-size:30px;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px);opacity:1;}
100%{transform:translateY(100vh);opacity:0;}
}

/* floating particles */

.particle{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
opacity:0.3;
animation:float 10s infinite linear;
}

@keyframes float{
0%{
transform:translateY(100vh);
}
100%{
transform:translateY(-10vh);
}
}

</style>
</head>

<body>

<div class="container">

<h1>🌸 Flower Tic Tac Toe 🌸</h1>

<div>
<button onclick="setMode('player')">👩‍🤝‍👩 Player vs Player</button>
<button onclick="setMode('ai')">🤖 Player vs Computer</button>
</div>

<div class="scoreboard">
🌸 Player: <span id="score1">0</span> |
🌼 Opponent: <span id="score2">0</span>
</div>

<div class="board">

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

</div>

<div id="status">Choose Game Mode</div>

<button onclick="restartGame()">Restart Game</button>

</div>

<script>

const cells=document.querySelectorAll(".cell");
const statusText=document.getElementById("status");

let currentPlayer="🌸";
let gameActive=false;
let mode="player";

let score1=0;
let score2=0;

const winPatterns=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

cells.forEach((cell,index)=>{
cell.addEventListener("click",()=>handleClick(cell,index));
});

function setMode(selectedMode){
mode=selectedMode;
restartGame();
gameActive=true;
statusText.textContent="🌸 Player Turn";
}

function handleClick(cell,index){

if(cell.textContent!=="" || !gameActive) return;

cell.textContent=currentPlayer;

checkWinner();

if(!gameActive) return;

if(mode==="ai" && currentPlayer==="🌸"){
currentPlayer="🌼";
statusText.textContent="Computer thinking...";
setTimeout(computerMove,500);
}else{
currentPlayer=currentPlayer==="🌸"?"🌼":"🌸";
statusText.textContent=currentPlayer+" Turn";
}

}

function computerMove(){

let empty=[];

cells.forEach((cell,index)=>{
if(cell.textContent==="") empty.push(index);
});

let randomIndex=empty[Math.floor(Math.random()*empty.length)];

cells[randomIndex].textContent="🌼";

checkWinner();

if(gameActive){
currentPlayer="🌸";
statusText.textContent="🌸 Your Turn";
}

}

function checkWinner(){

for(let pattern of winPatterns){

let a=cells[pattern[0]];
let b=cells[pattern[1]];
let c=cells[pattern[2]];

if(a.textContent!=="" &&
a.textContent===b.textContent &&
b.textContent===c.textContent){

a.classList.add("win");
b.classList.add("win");
c.classList.add("win");

statusText.textContent=a.textContent+" Wins! 🎉";

if(a.textContent==="🌸"){
score1++;
document.getElementById("score1").textContent=score1;
}else{
score2++;
document.getElementById("score2").textContent=score2;
}

flowerCelebration();
gameActive=false;
return;

}

}

let draw=[...cells].every(cell=>cell.textContent!=="");

if(draw){
statusText.textContent="Draw Game 🤝";
gameActive=false;
}

}

function restartGame(){

cells.forEach(cell=>{
cell.textContent="";
cell.classList.remove("win");
});

currentPlayer="🌸";
gameActive=true;

statusText.textContent="🌸 Player Turn";

}

function flowerCelebration(){

for(let i=0;i<30;i++){

let flower=document.createElement("div");
flower.innerHTML="🌸";
flower.classList.add("flower");

flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=(Math.random()*2+2)+"s";

document.body.appendChild(flower);

setTimeout(()=>{
flower.remove();
},3000);

}

}

/* background particles */

for(let i=0;i<25;i++){

let particle=document.createElement("div");
particle.classList.add("particle");

particle.style.left=Math.random()*100+"vw";
particle.style.animationDuration=(Math.random()*10+5)+"s";

document.body.appendChild(particle);

}

</script>

</body>
</html>
