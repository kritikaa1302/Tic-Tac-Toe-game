<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flower Tic Tac Toe</title>

<style>

body{
font-family:"Poppins",sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a1c4fd);
overflow:hidden;
}

.container{
text-align:center;
padding:30px;
border-radius:25px;
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.15);
box-shadow:0 8px 32px rgba(0,0,0,0.2);
}

h1{
color:white;
margin-bottom:10px;
}

.mode-buttons button{
margin:5px;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff6fa5;
color:white;
font-size:14px;
cursor:pointer;
}

.board{
display:grid;
grid-template-columns:repeat(3,110px);
gap:10px;
margin-top:20px;
justify-content:center;
}

.cell{
width:110px;
height:110px;
background:rgba(255,255,255,0.7);
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:45px;
cursor:pointer;
transition:0.3s;
}

.cell:hover{
transform:scale(1.05);
background:#fff0f6;
}

.win{
background:#baffc9 !important;
}

#status{
margin-top:15px;
font-size:20px;
color:white;
}

.scoreboard{
margin-top:10px;
color:white;
font-size:18px;
}

/* flower celebration */

.flower{
position:absolute;
font-size:30px;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>🌸 Flower Tic Tac Toe 🌸</h1>

<div class="mode-buttons">
<button onclick="setMode('player')">👩‍🤝‍👩 Player vs Player</button>
<button onclick="setMode('ai')">🤖 Player vs Computer</button>
</div>

<div class="scoreboard">
🌸 Player: <span id="score1">0</span> |
🌼 Opponent: <span id="score2">0</span>
</div>

<div class="board">
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
</div>

<div id="status">Choose Mode</div>

<button onclick="restartGame()">Restart</button>

</div>

<script>

const cells=document.querySelectorAll(".cell");
const statusText=document.getElementById("status");

let currentPlayer="🌸";
let gameActive=false;
let mode="player";

let score1=0;
let score2=0;

const winPatterns=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

cells.forEach((cell,index)=>{
cell.addEventListener("click",()=>handleClick(cell,index));
});

function setMode(selectedMode){
mode=selectedMode;
restartGame();
gameActive=true;
statusText.textContent="🌸 Player Turn";
}

function handleClick(cell,index){

if(cell.textContent!=="" || !gameActive) return;

cell.textContent=currentPlayer;

checkWinner();

if(!gameActive) return;

if(mode==="ai" && currentPlayer==="🌸"){
currentPlayer="🌼";
statusText.textContent="Computer thinking...";
setTimeout(computerMove,500);
}else{
currentPlayer=currentPlayer==="🌸"?"🌼":"🌸";
statusText.textContent=currentPlayer+" Turn";
}

}

function computerMove(){

let empty=[];

cells.forEach((cell,index)=>{
if(cell.textContent==="") empty.push(index);
});

let randomIndex=empty[Math.floor(Math.random()*empty.length)];

cells[randomIndex].textContent="🌼";

checkWinner();

if(gameActive){
currentPlayer="🌸";
statusText.textContent="🌸 Your Turn";
}

}

function checkWinner(){

for(let pattern of winPatterns){

let a=cells[pattern[0]];
let b=cells[pattern[1]];
let c=cells[pattern[2]];

if(a.textContent!=="" &&
a.textContent===b.textContent &&
b.textContent===c.textContent){

a.classList.add("win");
b.classList.add("win");
c.classList.add("win");

statusText.textContent=a.textContent+" Wins! 🎉";

if(a.textContent==="🌸"){
score1++;
document.getElementById("score1").textContent=score1;
}else{
score2++;
document.getElementById("score2").textContent=score2;
}

flowerCelebration();

gameActive=false;
return;
}

}

let draw=[...cells].every(cell=>cell.textContent!=="");

if(draw){
statusText.textContent="Draw Game 🤝";
gameActive=false;
}

}

function restartGame(){

cells.forEach(cell=>{
cell.textContent="";
cell.classList.remove("win");
});

currentPlayer="🌸";
gameActive=true;

statusText.textContent="🌸 Player Turn";

}

function flowerCelebration(){

for(let i=0;i<25;i++){

let flower=document.createElement("div");

flower.innerHTML="🌸";

flower.classList.add("flower");

flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=(Math.random()*2+2)+"s";

document.body.appendChild(flower);

setTimeout(()=>{
flower.remove();
},3000);

}

}

</script>

</body>
</html>
